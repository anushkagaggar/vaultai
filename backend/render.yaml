services:
  - type: web
    name: vaultai-backend
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt && alembic upgrade head"
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENV
        value: prod
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: QDRANT_HOST
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: OLLAMA_HOST
        sync: false
