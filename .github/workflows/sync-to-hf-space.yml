name: Sync to Hugging Face hub
on: [push]
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        # ONLY THIS LINE CHANGES: Replaced <USERNAME> and <SPACE>
        run: git push --force https://gaggaranushka:$HF_TOKEN@huggingface.co/spaces/gaggaranushka/VaultAI main
